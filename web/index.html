<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>小说有声书 — MiMo TTS</title>
<style>
/* ── Reset & Tokens ─────────────────────────────────── */
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

:root {
  --bg-0: #0c0c0e;
  --bg-1: #141416;
  --bg-2: #1c1c20;
  --bg-3: #242429;
  --bg-hover: #2a2a30;
  --border: #2e2e35;
  --border-light: #3a3a42;

  --text-0: #f0f0f2;
  --text-1: #c8c8ce;
  --text-2: #8e8e96;
  --text-3: #5c5c64;

  --accent: #6c8cff;
  --accent-dim: #6c8cff22;
  --accent-hover: #8da6ff;
  --green: #4ade80;
  --green-dim: #4ade8022;
  --orange: #fb923c;
  --orange-dim: #fb923c22;
  --red: #f87171;
  --red-dim: #f8717122;

  --radius-sm: 6px;
  --radius-md: 10px;
  --radius-lg: 14px;

  --font: -apple-system, "SF Pro Text", "Helvetica Neue", "PingFang SC", "Noto Sans SC", "Microsoft YaHei", sans-serif;
  --mono: "SF Mono", "Fira Code", "JetBrains Mono", monospace;

  --shadow-sm: 0 1px 3px rgba(0,0,0,.3);
  --shadow-md: 0 4px 16px rgba(0,0,0,.4);
  --shadow-lg: 0 8px 32px rgba(0,0,0,.5);

  --sidebar-w: 280px;
  --right-w: 340px;
}

html { font-size: 14px; }
body {
  font-family: var(--font);
  background: var(--bg-0);
  color: var(--text-0);
  line-height: 1.6;
  height: 100vh;
  overflow: hidden;
}

button { font-family: inherit; cursor: pointer; border: none; background: none; color: inherit; }
input, select, textarea { font-family: inherit; color: inherit; }

/* ── Layout ─────────────────────────────────────────── */
.app {
  display: grid;
  grid-template-columns: var(--sidebar-w) 1fr var(--right-w);
  grid-template-rows: 52px 1fr;
  height: 100vh;
}
.app.bookshelf-mode {
  grid-template-columns: 1fr;
}
.app.bookshelf-mode .main {
  grid-column: 1;
}

/* ── Header ─────────────────────────────────────────── */
.header {
  grid-column: 1 / -1;
  display: flex;
  align-items: center;
  justify-content: space-between;
  padding: 0 20px;
  background: var(--bg-1);
  border-bottom: 1px solid var(--border);
  z-index: 10;
}
.header-left { display: flex; align-items: center; gap: 12px; }
.brand-home {
  display: flex;
  align-items: center;
  gap: 12px;
  cursor: pointer;
  border-radius: var(--radius-sm);
  padding: 4px 6px 4px 0;
}
.brand-home:hover .header-title { color: var(--accent-hover); }
.header-logo {
  width: 28px; height: 28px;
  background: var(--accent);
  border-radius: var(--radius-sm);
  display: flex; align-items: center; justify-content: center;
  font-weight: 700; font-size: 15px;
}
.header-title { font-weight: 600; font-size: 15px; letter-spacing: -.01em; transition: color .12s; }
.header-subtitle { color: var(--text-2); font-size: 12px; margin-left: 4px; }
.header-filename { color: var(--text-2); font-size: 12px; margin-left: 12px; padding-left: 12px; border-left: 1px solid var(--border); }

.header-actions { display: flex; gap: 8px; align-items: center; }
.header-actions .badge {
  font-size: 11px;
  padding: 2px 8px;
  border-radius: 99px;
  font-weight: 500;
}
.badge-chapters { background: var(--accent-dim); color: var(--accent); }
.badge-chars { background: var(--green-dim); color: var(--green); }

/* ── Sidebar (Chapter List) ─────────────────────────── */
.sidebar {
  background: var(--bg-1);
  border-right: 1px solid var(--border);
  display: flex;
  flex-direction: column;
  overflow: hidden;
}
.sidebar.hidden { display: none; }
.sidebar-header {
  padding: 14px 16px 10px;
  display: flex;
  align-items: center;
  justify-content: space-between;
  flex-shrink: 0;
}
.sidebar-header h3 { font-size: 12px; font-weight: 600; text-transform: uppercase; letter-spacing: .06em; color: var(--text-2); }
.sidebar-count { font-size: 11px; color: var(--text-3); }

.sidebar-search {
  margin: 0 12px 8px;
  flex-shrink: 0;
}
.sidebar-search input {
  width: 100%;
  padding: 7px 10px;
  background: var(--bg-2);
  border: 1px solid var(--border);
  border-radius: var(--radius-sm);
  font-size: 12px;
  outline: none;
  transition: border-color .15s;
}
.sidebar-search input:focus { border-color: var(--accent); }
.sidebar-search input::placeholder { color: var(--text-3); }

.chapter-list {
  flex: 1;
  overflow-y: auto;
  padding: 0 8px 12px;
}
.chapter-list::-webkit-scrollbar { width: 4px; }
.chapter-list::-webkit-scrollbar-thumb { background: var(--border); border-radius: 4px; }

.chapter-item {
  display: flex;
  align-items: center;
  gap: 10px;
  padding: 9px 10px;
  border-radius: var(--radius-sm);
  cursor: pointer;
  transition: background .12s;
  position: relative;
}
.chapter-item:hover { background: var(--bg-hover); }
.chapter-item.active { background: var(--accent-dim); }
.chapter-item.active .chapter-name { color: var(--accent); font-weight: 500; }

.chapter-select {
  width: 15px;
  height: 15px;
  accent-color: var(--accent);
  flex-shrink: 0;
}

.chapter-status {
  width: 7px; height: 7px;
  border-radius: 50%;
  flex-shrink: 0;
  background: var(--border-light);
}
.chapter-status.done { background: var(--green); }
.chapter-status.analyzed { background: var(--accent); }
.chapter-status.analyzing, .chapter-status.synthesizing { background: var(--orange); animation: pulse 1.2s infinite; }
.chapter-status.error { background: var(--red); }

@keyframes pulse { 0%, 100% { opacity: 1; } 50% { opacity: .4; } }

.chapter-info { flex: 1; min-width: 0; }
.chapter-name {
  font-size: 13px;
  color: var(--text-1);
  white-space: nowrap;
  overflow: hidden;
  text-overflow: ellipsis;
}
.chapter-meta {
  font-size: 11px;
  color: var(--text-3);
  display: flex;
  gap: 8px;
  margin-top: 1px;
}

.sidebar-footer {
  padding: 10px 12px;
  border-top: 1px solid var(--border);
  flex-shrink: 0;
  display: flex;
  flex-wrap: wrap;
  gap: 6px;
}
.btn {
  padding: 7px 14px;
  border-radius: var(--radius-sm);
  font-size: 12px;
  font-weight: 500;
  transition: all .12s;
  display: inline-flex;
  align-items: center;
  gap: 5px;
}
.btn-primary { background: var(--accent); color: #fff; }
.btn-primary:hover { background: var(--accent-hover); }
.btn-primary:disabled { opacity: .5; cursor: not-allowed; }
.btn-ghost { color: var(--text-1); }
.btn-ghost:hover { background: var(--bg-hover); }
.btn-sm { padding: 5px 10px; font-size: 11px; }

/* ── Main Content ───────────────────────────────────── */
.main {
  display: flex;
  flex-direction: column;
  overflow: hidden;
  background: var(--bg-0);
}

/* Upload State */
.upload-zone {
  flex: 1;
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  gap: 16px;
  padding: 40px;
  transition: all .2s;
}
.upload-zone.hidden { display: none; }
.upload-icon {
  width: 80px; height: 80px;
  border: 2px dashed var(--border-light);
  border-radius: var(--radius-lg);
  display: flex; align-items: center; justify-content: center;
  font-size: 32px;
  color: var(--text-3);
  transition: all .2s;
}
.upload-zone.dragover .upload-icon {
  border-color: var(--accent);
  background: var(--accent-dim);
  color: var(--accent);
}
.upload-text { font-size: 15px; color: var(--text-2); }
.upload-hint { font-size: 12px; color: var(--text-3); }

/* Content Area (after upload) */
.content-area {
  flex: 1;
  display: flex;
  flex-direction: column;
  overflow: hidden;
}
.content-area.hidden { display: none; }

/* Toolbar */
.toolbar {
  display: flex;
  align-items: center;
  justify-content: space-between;
  padding: 10px 20px;
  border-bottom: 1px solid var(--border);
  flex-shrink: 0;
}
.toolbar-left { display: flex; align-items: center; gap: 12px; }
.toolbar-right { display: flex; align-items: center; gap: 8px; }

.tab-bar { display: flex; gap: 2px; }
.tab {
  padding: 5px 12px;
  font-size: 12px;
  font-weight: 500;
  color: var(--text-2);
  border-radius: var(--radius-sm);
  transition: all .12s;
}
.tab:hover { color: var(--text-0); background: var(--bg-2); }
.tab.active { color: var(--text-0); background: var(--bg-3); }

/* Chapter Content */
.chapter-content {
  flex: 1;
  overflow-y: auto;
  padding: 20px;
}
.chapter-content::-webkit-scrollbar { width: 6px; }
.chapter-content::-webkit-scrollbar-thumb { background: var(--border); border-radius: 4px; }

.chapter-title {
  font-size: 20px;
  font-weight: 600;
  margin-bottom: 20px;
  letter-spacing: -.01em;
}

/* Paragraph styles */
.para {
  margin-bottom: 6px;
  padding: 6px 10px;
  border-radius: var(--radius-sm);
  line-height: 1.8;
  transition: background .1s;
}
.para:hover { background: var(--bg-2); }
.para-narrator { color: var(--text-1); }
.para-dialogue { color: var(--text-0); }
.para-speaker {
  font-size: 11px;
  font-weight: 600;
  margin-right: 6px;
  padding: 1px 6px;
  border-radius: 3px;
  vertical-align: middle;
}
.speaker-陈新 { background: #6c8cff22; color: #6c8cff; }
.speaker-刘民有 { background: #4ade8022; color: #4ade80; }
.speaker-药农 { background: #fb923c22; color: #fb923c; }
.speaker-宋闻贤 { background: #c084fc22; color: #c084fc; }
.speaker-尹琬秋 { background: #f472b622; color: #f472b6; }
.speaker-小翠 { background: #f9a8d422; color: #f9a8d4; }
.speaker-旁白 { background: #52525233; color: var(--text-2); }

/* Analysis View */
.analysis-view { padding: 20px; overflow-y: auto; flex: 1; }
.analysis-view.hidden { display: none; }

.analysis-section { margin-bottom: 24px; }
.analysis-section h4 {
  font-size: 13px;
  font-weight: 600;
  color: var(--text-2);
  text-transform: uppercase;
  letter-spacing: .05em;
  margin-bottom: 12px;
  display: flex;
  align-items: center;
  gap: 6px;
}

.char-grid {
  display: grid;
  grid-template-columns: repeat(auto-fill, minmax(200px, 1fr));
  gap: 10px;
}
.char-card {
  background: var(--bg-2);
  border: 1px solid var(--border);
  border-radius: var(--radius-md);
  padding: 14px;
  transition: border-color .15s;
}
.char-card:hover { border-color: var(--border-light); }
.char-card-name {
  font-size: 15px;
  font-weight: 600;
  margin-bottom: 6px;
  display: flex;
  align-items: center;
  gap: 6px;
}
.char-card-name .gender-dot {
  width: 8px; height: 8px;
  border-radius: 50%;
}
.gender-dot.male { background: var(--accent); }
.gender-dot.female { background: #f472b6; }
.gender-dot.unknown { background: var(--text-3); }

.char-card-meta { font-size: 12px; color: var(--text-2); margin-bottom: 4px; }
.char-card-voice { font-size: 12px; color: var(--text-3); }

/* Stats Row */
.stats-row {
  display: grid;
  grid-template-columns: repeat(4, 1fr);
  gap: 10px;
  margin-bottom: 20px;
}
.stat-card {
  background: var(--bg-2);
  border: 1px solid var(--border);
  border-radius: var(--radius-md);
  padding: 14px 16px;
}
.stat-value { font-size: 22px; font-weight: 700; letter-spacing: -.02em; }
.stat-label { font-size: 11px; color: var(--text-3); margin-top: 2px; }

/* Audio Preview */
.audio-preview {
  background: var(--bg-2);
  border: 1px solid var(--border);
  border-radius: var(--radius-md);
  padding: 16px 20px;
}
.audio-preview-title { font-size: 12px; color: var(--text-2); margin-bottom: 10px; }
.waveform {
  height: 48px;
  background: var(--bg-3);
  border-radius: var(--radius-sm);
  display: flex;
  align-items: center;
  justify-content: center;
  overflow: hidden;
  position: relative;
}
.waveform-bars {
  display: flex;
  align-items: center;
  gap: 2px;
  height: 100%;
  padding: 8px 12px;
}
.waveform-bar {
  width: 3px;
  background: var(--accent);
  border-radius: 2px;
  opacity: .6;
  transition: opacity .1s;
}
.waveform-bar.played { opacity: 1; }

.audio-controls {
  display: flex;
  align-items: center;
  gap: 12px;
  margin-top: 10px;
}
.play-btn {
  width: 36px; height: 36px;
  background: var(--accent);
  border-radius: 50%;
  display: flex; align-items: center; justify-content: center;
  transition: background .12s;
}
.play-btn:hover { background: var(--accent-hover); }
.play-btn svg { fill: #fff; }

.audio-time { font-size: 12px; color: var(--text-3); font-family: var(--mono); }

.progress-bar-bg {
  flex: 1;
  height: 4px;
  background: var(--bg-3);
  border-radius: 2px;
  overflow: hidden;
}
.progress-bar-fill {
  height: 100%;
  background: var(--accent);
  border-radius: 2px;
  transition: width .3s;
}

/* ── Right Panel (Voice Config) ─────────────────────── */
.right-panel {
  background: var(--bg-1);
  border-left: 1px solid var(--border);
  display: flex;
  flex-direction: column;
  overflow: hidden;
}
.right-panel.hidden { display: none; }

.panel-header {
  padding: 14px 16px 10px;
  border-bottom: 1px solid var(--border);
  flex-shrink: 0;
}
.panel-header h3 {
  font-size: 12px;
  font-weight: 600;
  text-transform: uppercase;
  letter-spacing: .06em;
  color: var(--text-2);
}

.panel-content {
  flex: 1;
  overflow-y: auto;
  padding: 12px;
}
.panel-content::-webkit-scrollbar { width: 4px; }
.panel-content::-webkit-scrollbar-thumb { background: var(--border); border-radius: 4px; }

.voice-item {
  background: var(--bg-2);
  border: 1px solid var(--border);
  border-radius: var(--radius-md);
  padding: 14px;
  margin-bottom: 8px;
  transition: border-color .15s;
}
.voice-item:hover { border-color: var(--border-light); }

.voice-item-header {
  display: flex;
  align-items: center;
  justify-content: space-between;
  margin-bottom: 10px;
}
.voice-item-name {
  font-size: 14px;
  font-weight: 600;
  display: flex;
  align-items: center;
  gap: 6px;
}
.voice-item-badge {
  font-size: 10px;
  padding: 1px 6px;
  border-radius: 99px;
  font-weight: 500;
}
.voice-item-badge.preset { background: var(--accent-dim); color: var(--accent); }
.voice-item-badge.voicedesign { background: var(--green-dim); color: var(--green); }

.voice-item-form { display: flex; flex-direction: column; gap: 8px; }
.form-row { display: flex; gap: 8px; align-items: center; }
.form-label {
  font-size: 11px;
  color: var(--text-3);
  width: 48px;
  flex-shrink: 0;
  text-align: right;
}
.form-select, .form-input {
  flex: 1;
  padding: 6px 10px;
  background: var(--bg-3);
  border: 1px solid var(--border);
  border-radius: var(--radius-sm);
  font-size: 12px;
  outline: none;
  transition: border-color .15s;
}
.form-select:focus, .form-input:focus { border-color: var(--accent); }
.form-select option { background: var(--bg-3); }
textarea.form-input {
  resize: vertical;
  min-height: 52px;
  line-height: 1.5;
}

.voice-play-btn {
  margin-top: 6px;
  width: 100%;
  padding: 6px;
  background: var(--bg-3);
  border: 1px solid var(--border);
  border-radius: var(--radius-sm);
  font-size: 11px;
  color: var(--text-2);
  display: flex;
  align-items: center;
  justify-content: center;
  gap: 5px;
  transition: all .12s;
}
.voice-play-btn:hover { background: var(--bg-hover); border-color: var(--border-light); color: var(--text-0); }

.voice-item.narrator {
  border-color: var(--accent);
  background: var(--accent-dim);
}

.panel-footer {
  padding: 12px;
  border-top: 1px solid var(--border);
  flex-shrink: 0;
  display: flex;
  flex-direction: column;
  gap: 6px;
}
.btn-full { width: 100%; justify-content: center; }

/* ── Processing Overlay ─────────────────────────────── */
.processing-overlay {
  position: fixed;
  inset: 0;
  background: rgba(0,0,0,.7);
  backdrop-filter: blur(8px);
  display: flex;
  align-items: center;
  justify-content: center;
  z-index: 100;
}
.processing-overlay.hidden { display: none; }
.processing-card {
  background: var(--bg-1);
  border: 1px solid var(--border);
  border-radius: var(--radius-lg);
  padding: 32px 40px;
  min-width: 420px;
  text-align: center;
  box-shadow: var(--shadow-lg);
}
.processing-card h3 { font-size: 18px; margin-bottom: 8px; }
.processing-card p { font-size: 13px; color: var(--text-2); margin-bottom: 20px; }

.processing-steps {
  display: flex;
  flex-direction: column;
  gap: 10px;
  margin-bottom: 24px;
  text-align: left;
}
.processing-step {
  display: flex;
  align-items: center;
  gap: 10px;
  padding: 10px 14px;
  background: var(--bg-2);
  border-radius: var(--radius-sm);
  font-size: 13px;
}
.step-icon {
  width: 24px; height: 24px;
  border-radius: 50%;
  display: flex; align-items: center; justify-content: center;
  font-size: 12px;
  flex-shrink: 0;
  background: var(--bg-3);
  color: var(--text-3);
}
.step-icon.done { background: var(--green-dim); color: var(--green); }
.step-icon.active { background: var(--accent-dim); color: var(--accent); animation: pulse 1.2s infinite; }
.step-info { flex: 1; }
.step-label { font-weight: 500; }
.step-detail { font-size: 11px; color: var(--text-3); }

.processing-progress { margin-bottom: 16px; }
.processing-progress .progress-bar-bg { height: 6px; }
.processing-progress-label {
  display: flex;
  justify-content: space-between;
  font-size: 11px;
  color: var(--text-3);
  margin-top: 6px;
}

/* ── Toast ──────────────────────────────────────────── */
.toast-container {
  position: fixed;
  top: 64px;
  right: 20px;
  z-index: 200;
  display: flex;
  flex-direction: column;
  gap: 8px;
}
.toast {
  padding: 10px 16px;
  background: var(--bg-2);
  border: 1px solid var(--border);
  border-radius: var(--radius-md);
  font-size: 13px;
  box-shadow: var(--shadow-md);
  animation: slideIn .2s ease;
}
.toast.success { border-color: var(--green); }
.toast.error { border-color: var(--red); }
@keyframes slideIn { from { transform: translateX(100%); opacity: 0; } to { transform: translateX(0); opacity: 1; } }

/* ── Empty State ────────────────────────────────────── */
.empty-state {
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  gap: 8px;
  padding: 40px;
  color: var(--text-3);
}
.empty-state-icon { font-size: 32px; margin-bottom: 8px; }
.empty-state-text { font-size: 14px; }

/* ── Bookshelf ──────────────────────────────────────── */
.bookshelf-overlay {
  flex: 1;
  overflow-y: auto;
  padding: 32px 40px;
}
.bookshelf-overlay.hidden { display: none; }

.bookshelf-header {
  display: flex;
  align-items: center;
  justify-content: space-between;
  margin-bottom: 24px;
}
.bookshelf-header h2 {
  font-size: 20px;
  font-weight: 600;
}
.bookshelf-grid {
  display: grid;
  grid-template-columns: repeat(auto-fill, minmax(260px, 1fr));
  gap: 16px;
}
.bookshelf-card {
  background: var(--bg-1);
  border: 1px solid var(--border);
  border-radius: var(--radius-md);
  padding: 20px;
  cursor: pointer;
  transition: border-color .15s, box-shadow .15s;
  position: relative;
  display: flex;
  flex-direction: column;
  gap: 12px;
}
.bookshelf-card:hover {
  border-color: var(--accent);
  box-shadow: 0 0 0 1px var(--accent-dim), var(--shadow-sm);
}
.bookshelf-card-title {
  font-size: 16px;
  font-weight: 600;
  color: var(--text-0);
  white-space: nowrap;
  overflow: hidden;
  text-overflow: ellipsis;
  padding-right: 28px;
}
.bookshelf-card-meta {
  display: flex;
  gap: 12px;
  font-size: 12px;
  color: var(--text-3);
}
.bookshelf-card-meta span { display: flex; align-items: center; gap: 4px; }
.bookshelf-card-delete {
  position: absolute;
  top: 14px;
  right: 14px;
  width: 24px;
  height: 24px;
  border-radius: var(--radius-sm);
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 14px;
  color: var(--text-3);
  opacity: 0;
  transition: all .15s;
}
.bookshelf-card:hover .bookshelf-card-delete { opacity: 1; }
.bookshelf-card-delete:hover {
  background: var(--red-dim);
  color: var(--red);
}
.bookshelf-empty {
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  gap: 16px;
  padding: 80px 40px;

}
.bookshelf-empty-icon { font-size: 48px; }
.bookshelf-empty-text { font-size: 15px; }

/* ── Project Switcher ─────────────────────────────── */
.project-switcher {
  position: relative;
}
.project-switcher-btn {
  display: flex;
  align-items: center;
  gap: 6px;
  padding: 5px 10px;
  background: var(--bg-2);
  border: 1px solid var(--border);
  border-radius: var(--radius-sm);
  font-size: 12px;
  color: var(--text-1);
  cursor: pointer;
  transition: all .12s;
}
.project-switcher-btn:hover { border-color: var(--border-light); background: var(--bg-3); }
.project-switcher-btn .switcher-name {
  max-width: 160px;
  white-space: nowrap;
  overflow: hidden;
  text-overflow: ellipsis;
}
.project-switcher-btn .switcher-arrow { font-size: 10px; color: var(--text-3); }
.project-switcher-dropdown {
  display: none;
  position: absolute;
  top: calc(100% + 4px);
  left: 0;
  min-width: 280px;
  max-height: 360px;
  overflow-y: auto;
  background: var(--bg-1);
  border: 1px solid var(--border);
  border-radius: var(--radius-md);

  padding: 6px;

.project-switcher-item {
  display: flex;
  align-items: center;
  justify-content: space-between;
  padding: 8px 10px;
  border-radius: var(--radius-sm);
  cursor: pointer;
  transition: background .12s;
  gap: 8px;
}
.project-switcher-item:hover { background: var(--bg-hover); }
.project-switcher-item.active { background: var(--accent-dim); }
.project-switcher-item-name {
  font-size: 13px;
  color: var(--text-1);
  white-space: nowrap;
  overflow: hidden;
  text-overflow: ellipsis;
  flex: 1;
}
.project-switcher-item-delete {
  width: 22px;
  height: 22px;
  border-radius: var(--radius-sm);
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 12px;
  color: var(--text-3);
  flex-shrink: 0;
  opacity: 0;
  transition: all .12s;
}
.project-switcher-item:hover .project-switcher-item-delete { opacity: 1; }
.project-switcher-item-delete:hover { background: var(--red-dim); color: var(--red); }
.project-switcher-divider {
  height: 1px;
  background: var(--border);
  margin: 4px 0;
}
.project-switcher-footer {
  padding: 6px;
}
.project-switcher-footer .btn { width: 100%; justify-content: center; }

/* ── Responsive ─────────────────────────────────────── */
@media (max-width: 1100px) {
  .app { grid-template-columns: var(--sidebar-w) 1fr; }
  .right-panel { display: none; }
}
@media (max-width: 768px) {
  .app { grid-template-columns: 1fr; }
  .sidebar { display: none; }
}
</style>
</head>
<body>

<div class="app">
  <!-- ── Header ──────────────────────────────── -->
  <header class="header">
    <div class="header-left">
      <div class="brand-home" id="brand-home" title="返回书架">
        <div class="header-logo">书</div>
        <span class="header-title">小说有声书</span>
      </div>
      <span class="header-subtitle">MiMo TTS</span>
      <div class="project-switcher" id="project-switcher" style="display:none">
        <button class="project-switcher-btn" id="project-switcher-btn">
          <span class="switcher-name" id="project-switcher-name"></span>

      <button class="btn btn-ghost btn-sm" id="btn-analyze-selected" disabled>分析选中章节</button>

  <!-- ── Main Content ────────────────────────── -->
  <main class="main">
    <!-- Bookshelf (multi-project view) -->
    <div class="bookshelf-overlay hidden" id="bookshelf">
      <div class="bookshelf-header">
        <h2>📚 我的书架</h2>
        <button class="btn btn-primary btn-sm" id="btn-bookshelf-upload">+ 上传新书</button>
      </div>
      <div id="bookshelf-content"></div>
    </div>

    <!-- Upload Zone (initial state) -->
    <div class="upload-zone" id="upload-zone">

      <div class="upload-text">拖拽 EPUB 或 TXT 文件到此处</div>
      <div class="upload-hint">或点击选择文件</div>

      <!-- Reader Tab -->

  <!-- ── Right Panel (Voice Config) ──────────── -->
  <aside class="right-panel" id="right-panel">

</div>

<!-- ── Processing Overlay ────────────────────── -->
<div class="processing-overlay hidden" id="processing-overlay">
  <div class="processing-card">
    <h3 id="processing-title">正在处理…</h3>

        <div class="progress-bar-fill" id="processing-progress-bar" style="width: 0%"></div>

<!-- ── Audio Player (hidden) ─────────────────── -->

<script>
// ── API Client ────────────────────────────────
const API_BASE = window.location.origin;

const api = {
  async upload(file) {
    const formData = new FormData();
    formData.append('file', file);
    const res = await fetch(`${API_BASE}/api/upload`, { method: 'POST', body: formData });
    if (!res.ok) throw new Error(await res.text());
    return res.json();
  },

  async getStatus() {
    const res = await fetch(`${API_BASE}/api/status`);
    return res.json();
  },

  async getProjects() {
    const res = await fetch(`${API_BASE}/api/projects`);
    return res.json();
  },

  async deleteProject(id) {
    const res = await fetch(`${API_BASE}/api/projects/${id}`, { method: 'DELETE' });
    if (!res.ok) throw new Error(await res.text());
    return res.json();
  },

  async getChapters(projectId) {
    const res = await fetch(`${API_BASE}/api/chapters?project_id=${encodeURIComponent(projectId)}`);
    if (!res.ok) throw new Error(await res.text());
    return res.json();
  },

  async getChapter(projectId, chapterId) {
    const res = await fetch(`${API_BASE}/api/chapters/${chapterId}?project_id=${encodeURIComponent(projectId)}`);
    if (!res.ok) throw new Error(await res.text());
    return res.json();
  },

  async analyze(chapterIds, workers = 5) {
    const res = await fetch(`${API_BASE}/api/analyze?project_id=${encodeURIComponent(state.projectId)}`, {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ chapter_ids: chapterIds, llm_workers: workers })
    });
    if (!res.ok) throw new Error(await res.text());
    return res.json();
  },

  async synthesize(chapterIds, workers = 3) {
    const res = await fetch(`${API_BASE}/api/synthesize?project_id=${encodeURIComponent(state.projectId)}`, {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ chapter_ids: chapterIds, tts_workers: workers })
    });
    if (!res.ok) throw new Error(await res.text());
    return res.json();
  },

  async getTaskStatus(taskId) {
    const res = await fetch(`${API_BASE}/api/tasks/${taskId}`);
    return res.json();
  },

  async getCharacters(projectId) {
    const res = await fetch(`${API_BASE}/api/characters?project_id=${encodeURIComponent(projectId)}`);
    return res.json();
  },

  async getVoices(projectId) {
    const res = await fetch(`${API_BASE}/api/voices?project_id=${encodeURIComponent(projectId)}`);
    return res.json();
  },

  async updateVoices(projectId, voices) {
    const res = await fetch(`${API_BASE}/api/voices?project_id=${encodeURIComponent(projectId)}`, {
      method: 'PUT',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify(voices)
    });
    return res.json();
  },

  getAudioUrl(projectId, chapterId) {
    return `${API_BASE}/api/audio/${chapterId}?project_id=${encodeURIComponent(projectId)}`;
  },

  getExportUrl(projectId) {
    return `${API_BASE}/api/export?project_id=${encodeURIComponent(projectId)}`;
  }
};

// ── State ─────────────────────────────────────
const state = {
  projectId: null,
  filename: null,
  chapters: [],
  currentChapter: null,
  currentChapterHasAnalysis: false,
  characters: [],
  voices: null,
  audioPlaying: false,
  projects: [],
  selectedChapterIds: new Set(),
  taskBusy: {
    analyze: false,
    synthesize: false,
  },
};

// ── Toast ─────────────────────────────────────
function showToast(message, type = 'info') {
  const container = document.getElementById('toast-container');
  const toast = document.createElement('div');
  toast.className = `toast ${type}`;
  toast.textContent = message;
  container.appendChild(toast);
  setTimeout(() => toast.remove(), 3000);
}

// ── Render Functions ──────────────────────────
function renderChapters() {
  const list = document.getElementById('chapter-list');
  const query = document.getElementById('chapter-search').value.toLowerCase();

  const filtered = state.chapters.filter(ch =>
    ch.title.toLowerCase().includes(query) || ch.id.toString().includes(query)
  );

  list.innerHTML = filtered.map(ch => `
    <div class="chapter-item ${state.currentChapter?.id === ch.id ? 'active' : ''}" data-id="${ch.id}">
      <input class="chapter-select" type="checkbox" data-id="${ch.id}" ${state.selectedChapterIds.has(ch.id) ? 'checked' : ''} aria-label="选择 ${ch.title}">
      <div class="chapter-status ${ch.status}"></div>
      <div class="chapter-info">
        <div class="chapter-name">${ch.title}</div>
        <div class="chapter-meta">
          <span>${ch.word_count.toLocaleString()} 字</span>
          ${ch.status === 'done' ? '<span style="color:var(--green)">✓ 已合成</span>' :
            ch.status === 'analyzed' ? '<span style="color:var(--accent)">已分析</span>' :
            ch.status === 'error' ? '<span style="color:var(--red)">错误</span>' : ''}
        </div>
      </div>
    </div>
  `).join('');

  // Update counts
  const total = state.chapters.length;
  const done = state.chapters.filter(ch => ch.status === 'done').length;
  document.getElementById('sidebar-count').textContent = `${done} / ${total}`;
  document.getElementById('badge-chapters').textContent = `${total} 章`;
  document.getElementById('badge-chapters').style.display = '';

  updateChapterActionButtons();
}

function updateChapterActionButtons() {
  const hasPending = state.chapters.some(ch => ch.status === 'pending');
  const hasAnalysis = state.chapters.some(ch => ch.has_analysis);
  const hasCurrent = Boolean(state.currentChapter);
  const selectedCount = state.selectedChapterIds.size;
  const analyzing = state.taskBusy.analyze;
  const synthesizing = state.taskBusy.synthesize;
  const selectedBtn = document.getElementById('btn-analyze-selected');

  document.getElementById('btn-analyze-current').disabled = analyzing || !hasCurrent;
  selectedBtn.disabled = analyzing || selectedCount === 0;
  selectedBtn.textContent = analyzing
    ? '分析中...'
    : selectedCount > 0 ? `分析选中章节 (${selectedCount})` : '分析选中章节';

  const analyzeAllBtn = document.getElementById('btn-analyze');
  analyzeAllBtn.disabled = analyzing || !hasPending;
  analyzeAllBtn.textContent = analyzing ? '分析中...' : 'LLM 分析';

  const synthesizeAllBtn = document.getElementById('btn-synthesize-all');
  synthesizeAllBtn.disabled = synthesizing || !hasAnalysis;
  synthesizeAllBtn.textContent = synthesizing ? '合成中...' : '合成全部';
  updateSynthesizeButton();
}

function updateSynthesizeButton() {
  const button = document.getElementById('btn-synthesize');
  if (!button) return;
  const hasCurrentAnalysis = Boolean(state.currentChapterHasAnalysis || state.currentChapter?.has_analysis);
  button.disabled = state.taskBusy.synthesize || !hasCurrentAnalysis;
  button.textContent = state.taskBusy.synthesize ? '🔊 合成中...' : '🔊 合成本章';
}

function setTaskBusy(type, busy) {
  state.taskBusy[type] = busy;
  updateChapterActionButtons();
}

async function loadChapterContent(chapterId) {
  if (!state.projectId) return;

  try {
    const data = await api.getChapter(state.projectId, chapterId);
    const ch = state.chapters.find(c => c.id === chapterId);
    state.currentChapter = ch;
    state.currentChapterHasAnalysis = Boolean(data.analysis);

    // Render paragraphs
    renderChapterText(data);

    // Render or clear chapter-scoped analysis.
    renderAnalysis(data.analysis);
    renderVoicePanel(data.analysis);

    renderChapters();
  } catch (e) {
    showToast('加载章节失败: ' + e.message, 'error');
  }
}

function renderChapterText(data) {
  const title = document.getElementById('chapter-title');
  const container = document.getElementById('paragraphs');

  title.textContent = state.currentChapter?.title || `第 ${data.id} 章`;

  const paragraphs = data.analysis?.segments || data.analysis?.paragraphs || [];
  if (paragraphs.length > 0) {
    container.innerHTML = paragraphs.map(p => {
      if (p.speaker) {
        return `<div class="para para-dialogue">
          <span class="para-speaker speaker-${p.speaker}">${p.speaker}</span>${p.text}
        </div>`;
      }
      return `<div class="para para-narrator">${p.text}</div>`;
    }).join('');
  } else {
    // 显示原始文本
    const lines = data.content.split('\n').filter(l => l.trim());
    container.innerHTML = lines.map(line =>
      `<div class="para para-narrator">${line}</div>`
    ).join('');
  }
}

function renderAnalysis(analysis) {
  const paragraphs = analysis?.segments || analysis?.paragraphs || [];
  const characters = analysis?.characters || [];

  document.getElementById('stat-paragraphs').textContent = paragraphs.length;
  document.getElementById('stat-characters').textContent = characters.length;

  // Estimate duration (roughly 200 chars per minute)
  const totalChars = paragraphs.reduce((sum, p) => sum + (p.text?.length || 0), 0);
  const minutes = Math.floor(totalChars / 200);
  const seconds = Math.floor((totalChars % 200) / 200 * 60);
  document.getElementById('stat-duration').textContent = `${minutes}:${seconds.toString().padStart(2, '0')}`;

  // Render character grid
  const grid = document.getElementById('char-grid');
  if (!analysis) {
    grid.innerHTML = `<div class="empty-state">
      <div class="empty-state-icon">🔍</div>
      <div class="empty-state-text">当前章节尚未分析</div>
    </div>`;
    document.getElementById('stat-duration').textContent = '-';
    document.getElementById('stat-tokens').textContent = '-';
    return;
  }

  grid.innerHTML = characters.map(c => {
    const genderClass = c.gender === 'male' ? 'male' : c.gender === 'female' ? 'female' : 'unknown';
    const genderLabel = c.gender === 'male' ? '男' : c.gender === 'female' ? '女' : '未知';
    const ageLabel = c.age === 'young' ? '青年' : c.age === 'old' ? '老年' : c.age === 'middle' ? '中年' : '未知';
    return `<div class="char-card">
      <div class="char-card-name">
        <span class="gender-dot ${genderClass}"></span>
        ${c.name}
      </div>
      <div class="char-card-meta">${genderLabel} · ${ageLabel}</div>
      <div class="char-card-voice">🎤 ${c.voice_hint || '默认'}</div>
    </div>`;
  }).join('');

  // Update global characters
  for (const c of characters) {
    if (!state.characters.find(sc => sc.name === c.name)) {
      state.characters.push(c);
    }
  }
  document.getElementById('badge-chars').textContent = `${state.characters.length} 角色`;
  document.getElementById('badge-chars').style.display = '';
}

function renderVoicePanel(analysis) {
  const container = document.getElementById('voice-panel-content');
  const voices = state.voices || { default: { mode: 'preset', voice_id: '白桦', style_instruction: '标准播音腔朗读' }, characters: {} };

  if (!analysis) {
    container.innerHTML = `<div class="empty-state">
      <div class="empty-state-icon">🎤</div>
      <div class="empty-state-text">当前章节尚未分析</div>
    </div>`;
    updateSynthesizeButton();
    return;
  }

  const voicePresets = ["白桦", "苏打", "冰糖", "茉莉", "Mia", "Chloe", "Milo", "Dean"];

  // Narrator
  const defaultVoice = voices.default || {};
  let html = `<div class="voice-item narrator">
    <div class="voice-item-header">
      <div class="voice-item-name">📖 旁白</div>
    </div>
    <div class="voice-item-form">
      <div class="form-row">
        <span class="form-label">音色</span>
        <select class="form-select" data-role="default" data-field="voice_id">
          ${voicePresets.map(v => `<option ${v === defaultVoice.voice_id ? 'selected' : ''}>${v}</option>`).join('')}
        </select>
      </div>
      <div class="form-row">
        <span class="form-label">风格</span>
        <input class="form-input" data-role="default" data-field="style_instruction" value="${defaultVoice.style_instruction || ''}">
      </div>
    </div>
  </div>`;

  // Characters
  const characters = analysis.characters || [];
  for (const c of characters) {
    const charVoice = voices.characters?.[c.name] || {};
    const mode = charVoice.mode || (charVoice.voice_prompt ? 'voicedesign' : 'preset');
    const styleField = mode === 'voicedesign' ? 'voice_prompt' : 'style_instruction';
    const styleValue = mode === 'voicedesign'
      ? (charVoice.voice_prompt || charVoice.style_instruction || c.voice_hint || c.description || '')
      : (charVoice.style_instruction || charVoice.voice_prompt || c.voice_hint || c.description || '');
    const genderClass = c.gender === 'male' ? 'male' : c.gender === 'female' ? 'female' : 'unknown';

    html += `<div class="voice-item">
      <div class="voice-item-header">
        <div class="voice-item-name">
          <span class="gender-dot ${genderClass}"></span>
          ${c.name}
        </div>
        <span class="voice-item-badge ${mode}">${mode}</span>
      </div>
      <div class="voice-item-form">
        <input type="hidden" data-role="char" data-name="${c.name}" data-field="mode" value="${mode}">
        <input type="hidden" data-role="char" data-name="${c.name}" data-field="gender" value="${charVoice.gender || c.gender || ''}">
        <input type="hidden" data-role="char" data-name="${c.name}" data-field="age" value="${charVoice.age || c.age || ''}">
        <div class="form-row">
          <span class="form-label">音色</span>
          <select class="form-select" data-role="char" data-name="${c.name}" data-field="voice_id">
            ${voicePresets.map(v => `<option ${v === (charVoice.voice_id || '白桦') ? 'selected' : ''}>${v}</option>`).join('')}
          </select>
        </div>
        <div class="form-row">
          <span class="form-label">风格</span>
          <textarea class="form-input" data-role="char" data-name="${c.name}" data-field="${styleField}">${styleValue}</textarea>
        </div>
        <button class="voice-play-btn" onclick="previewVoice('${c.name}')">▶ 试听</button>
      </div>
    </div>`;
  }

  container.innerHTML = html;
  updateSynthesizeButton();
}

// ── Task Polling ──────────────────────────────
function watchTask(taskId, type) {
  setTaskBusy(type, true);
  const poll = setInterval(async () => {
    try {
      const task = await api.getTaskStatus(taskId);
      const percent = task.total > 0 ? Math.round(task.progress / task.total * 100) : 0;

      if (task.status === 'completed') {
        clearInterval(poll);
        setTaskBusy(type, false);
        showToast(type === 'analyze' ? '分析完成！' : '合成完成！', 'success');
        await refreshChapters();
        await loadVoices();
        if (state.currentChapter) {
          await loadChapterContent(state.currentChapter.id);
        }
      } else if (task.status === 'failed') {
        clearInterval(poll);
        setTaskBusy(type, false);
        showToast(`任务失败: ${task.error || '未知错误'}`, 'error');
      } else if (percent > 0 && percent < 100) {
        console.debug(`${type} task ${taskId}: ${task.progress} / ${task.total}`);
      }
    } catch (e) {
      clearInterval(poll);
      setTaskBusy(type, false);
      showToast('任务查询失败', 'error');
    }
  }, 1000);
}

async function analyzeChapterIds(chapterIds) {
  if (!state.projectId) return;
  if (!chapterIds.length) {
    showToast('请先选择要分析的章节', 'error');
    return;
  }

  const data = await api.analyze(chapterIds);
  showToast(`开始分析 ${data.chapter_count} 章`, 'success');
  watchTask(data.task_id, 'analyze');
}

// ── Data Loading ──────────────────────────────
async function refreshChapters() {
  if (!state.projectId) return;
  try {
    const data = await api.getChapters(state.projectId);
    state.chapters = data.chapters;
    const validIds = new Set(state.chapters.map(ch => ch.id));
    state.selectedChapterIds = new Set([...state.selectedChapterIds].filter(id => validIds.has(id)));
    renderChapters();
  } catch (e) {
    showToast('刷新章节失败', 'error');
  }
}

async function loadVoices() {
  if (!state.projectId) return;
  try {
    const data = await api.getVoices(state.projectId);
    state.voices = data.voices;
  } catch (e) {
    // Ignore - will use defaults
  }
}

// ── Bookshelf & Project Management ──────────
function getRouteProjectId() {
  const id = decodeURIComponent(window.location.pathname.replace(/^\/+|\/+$/g, ''));
  return id && !id.includes('/') ? id : null;
}

function setRouteProjectId(projectId, replace = false) {
  const path = projectId ? `/${encodeURIComponent(projectId)}` : '/';
  if (window.location.pathname === path) return;
  const method = replace ? 'replaceState' : 'pushState';
  history[method]({}, '', path);
}

async function loadProjects() {
  try {
    const data = await api.getProjects();
    state.projects = data.projects || [];
  } catch (e) {
    state.projects = [];
  }
}

function showBookshelf(updateRoute = true) {
  if (updateRoute) setRouteProjectId(null);
  state.projectId = null;
  state.filename = null;
  state.chapters = [];
  state.currentChapter = null;
  state.currentChapterHasAnalysis = false;
  state.characters = [];
  state.voices = null;
  state.audioPlaying = false;
  state.selectedChapterIds.clear();

  document.getElementById('bookshelf').classList.remove('hidden');
  document.getElementById('upload-zone').classList.add('hidden');
  document.getElementById('content-area').classList.add('hidden');
  document.querySelector('.app').classList.add('bookshelf-mode');
  document.querySelector('.sidebar').classList.add('hidden');
  document.getElementById('right-panel').classList.add('hidden');
  document.getElementById('project-switcher').style.display = 'none';
  document.getElementById('header-filename').style.display = 'none';
  document.getElementById('badge-chapters').style.display = 'none';
  document.getElementById('badge-chars').style.display = 'none';

  renderBookshelf();
}

function renderBookshelf() {
  const container = document.getElementById('bookshelf-content');

  if (state.projects.length === 0) {
    container.innerHTML = `
      <div class="bookshelf-empty">
        <div class="bookshelf-empty-icon">📚</div>
        <div class="bookshelf-empty-text">还没有任何项目</div>
        <button class="btn btn-primary" onclick="triggerBookshelfUpload()">上传第一本书</button>
      </div>`;
    return;
  }

  container.innerHTML = `<div class="bookshelf-grid">${state.projects.map(p => {
    const date = p.created_at ? new Date(p.created_at).toLocaleDateString('zh-CN') : '';
    return `
      <div class="bookshelf-card" data-project-id="${p.id}">
        <div class="bookshelf-card-title" title="${p.filename || p.name || '未命名'}">${p.filename || p.name || '未命名'}</div>
        <div class="bookshelf-card-meta">
          <span>📄 ${p.chapter_count ?? '?'} 章</span>
          <span>📝 ${(p.total_words || 0).toLocaleString()} 字</span>
          ${date ? `<span>📅 ${date}</span>` : ''}
        </div>
        <button class="bookshelf-card-delete" title="删除项目" data-delete-id="${p.id}">✕</button>
      </div>`;
  }).join('')}</div>`;
}

function triggerBookshelfUpload() {
  document.getElementById('file-input').click();
}

async function openProject(projectId, updateRoute = true) {
  const project = state.projects.find(p => p.id === projectId);
  if (!project) return;
  if (updateRoute) setRouteProjectId(projectId);

  state.projectId = projectId;
  state.filename = project.filename || project.name;
  state.chapters = [];
  state.currentChapter = null;
  state.currentChapterHasAnalysis = false;
  state.characters = [];
  state.voices = null;
  state.audioPlaying = false;
  state.selectedChapterIds.clear();

  document.getElementById('bookshelf').classList.add('hidden');
  document.getElementById('upload-zone').classList.add('hidden');
  document.getElementById('content-area').classList.remove('hidden');
  document.querySelector('.app').classList.remove('bookshelf-mode');
  document.querySelector('.sidebar').classList.remove('hidden');
  document.getElementById('right-panel').classList.remove('hidden');

  // Update header
  document.getElementById('header-filename').textContent = state.filename;
  document.getElementById('header-filename').style.display = '';
  document.getElementById('project-switcher').style.display = '';

  updateProjectSwitcher();

  // Reset tabs
  document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
  document.querySelector('.tab[data-tab="reader"]').classList.add('active');
  document.getElementById('reader-view').classList.remove('hidden');
  document.getElementById('analysis-view').classList.add('hidden');
  document.getElementById('audio-view').classList.add('hidden');

  await refreshChapters();
  await loadVoices();

  if (state.chapters.length > 0) {
    await loadChapterContent(state.chapters[0].id);
  }
}

async function deleteProjectConfirmed(projectId) {
  if (!confirm('确定要删除这个项目吗？此操作不可撤销。')) return;

  try {
    await api.deleteProject(projectId);
    showToast('项目已删除', 'success');
    await loadProjects();

    if (state.projectId === projectId) {
      showBookshelf();
    } else {
      renderBookshelf();
      updateProjectSwitcher();
    }
  } catch (e) {
    showToast('删除失败: ' + e.message, 'error');
  }
}

function updateProjectSwitcher() {
  const switcher = document.getElementById('project-switcher');
  const nameEl = document.getElementById('project-switcher-name');
  const dropdown = document.getElementById('project-switcher-dropdown');

  if (!state.projectId) {
    switcher.style.display = 'none';
    return;
  }

  switcher.style.display = '';
  nameEl.textContent = state.filename || '未命名';

  // Build dropdown content
  const items = state.projects.map(p => `
    <div class="project-switcher-item ${p.id === state.projectId ? 'active' : ''}" data-project-id="${p.id}">
      <span class="project-switcher-item-name" title="${p.filename || p.name || '未命名'}">${p.filename || p.name || '未命名'}</span>
      <button class="project-switcher-item-delete" data-delete-id="${p.id}" title="删除">✕</button>
    </div>
  `).join('');

  dropdown.innerHTML = items;

  // Bind events on dropdown items
  dropdown.querySelectorAll('.project-switcher-item').forEach(item => {
    item.addEventListener('click', (e) => {
      if (e.target.closest('.project-switcher-item-delete')) return;
      const id = item.dataset.projectId;
      dropdown.classList.remove('open');
      if (id !== state.projectId) openProject(id);
    });
  });

  dropdown.querySelectorAll('.project-switcher-item-delete').forEach(btn => {
    btn.addEventListener('click', (e) => {
      e.stopPropagation();
      const id = btn.dataset.deleteId;
      deleteProjectConfirmed(id);
    });
  });

}

function closeSwitcherDropdown(e) {
  const switcher = document.getElementById('project-switcher');
  const dropdown = document.getElementById('project-switcher-dropdown');
  if (!switcher.contains(e.target)) {
    dropdown.classList.remove('open');
  }
}

// ── Event Handlers ────────────────────────────
function initEventHandlers() {
  // Upload
  const uploadZone = document.getElementById('upload-zone');
  const fileInput = document.getElementById('file-input');

  document.getElementById('btn-upload').addEventListener('click', () => fileInput.click());

  uploadZone.addEventListener('dragover', e => {
    e.preventDefault();
    uploadZone.classList.add('dragover');
  });
  uploadZone.addEventListener('dragleave', () => uploadZone.classList.remove('dragover'));
  uploadZone.addEventListener('drop', async e => {
    e.preventDefault();
    uploadZone.classList.remove('dragover');
    await handleUpload(e.dataTransfer.files[0]);
  });
  fileInput.addEventListener('change', async e => {
    if (e.target.files[0]) await handleUpload(e.target.files[0]);
  });

  // Bookshelf card clicks & delete
  document.getElementById('bookshelf-content').addEventListener('click', async e => {
    const deleteBtn = e.target.closest('.bookshelf-card-delete');
    if (deleteBtn) {
      e.stopPropagation();
      const id = deleteBtn.dataset.deleteId;
      await deleteProjectConfirmed(id);
      return;
    }
    const card = e.target.closest('.bookshelf-card');
    if (card) {
      const id = card.dataset.projectId;
      await openProject(id);
    }
  });

  // Bookshelf drag-and-drop upload
  const bookshelf = document.getElementById('bookshelf');
  bookshelf.addEventListener('dragover', e => {
    e.preventDefault();
    bookshelf.style.background = 'var(--accent-dim)';
  });
  bookshelf.addEventListener('dragleave', () => {
    bookshelf.style.background = '';
  });
  bookshelf.addEventListener('drop', async e => {
    e.preventDefault();
    bookshelf.style.background = '';
    if (e.dataTransfer.files[0]) await handleUpload(e.dataTransfer.files[0]);
  });

  // Bookshelf upload button
  document.getElementById('btn-bookshelf-upload').addEventListener('click', triggerBookshelfUpload);

  document.getElementById('brand-home').addEventListener('click', () => {
    closeSwitcherDropdown({ target: document.body });
    showBookshelf();
  });

  // Project switcher toggle
  document.getElementById('project-switcher-btn').addEventListener('click', (e) => {
    e.stopPropagation();
    const dropdown = document.getElementById('project-switcher-dropdown');
    dropdown.classList.toggle('open');
  });

  // Close switcher dropdown on outside click
  document.addEventListener('click', closeSwitcherDropdown);

  // Chapter click
  document.getElementById('chapter-list').addEventListener('click', e => {
    if (e.target.closest('.chapter-select')) return;
    const item = e.target.closest('.chapter-item');
    if (!item) return;
    const id = parseInt(item.dataset.id);
    loadChapterContent(id);
  });

  document.getElementById('chapter-list').addEventListener('change', e => {
    const checkbox = e.target.closest('.chapter-select');
    if (!checkbox) return;
    const id = parseInt(checkbox.dataset.id);
    if (checkbox.checked) {
      state.selectedChapterIds.add(id);
    } else {
      state.selectedChapterIds.delete(id);
    }
    updateChapterActionButtons();
  });

  // Chapter search
  document.getElementById('chapter-search').addEventListener('input', renderChapters);

  // Tab switching
  document.querySelectorAll('.tab').forEach(tab => {
    tab.addEventListener('click', () => {
      document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
      tab.classList.add('active');
      const view = tab.dataset.tab;
      document.getElementById('reader-view').classList.toggle('hidden', view !== 'reader');
      document.getElementById('analysis-view').classList.toggle('hidden', view !== 'analysis');
      document.getElementById('audio-view').classList.toggle('hidden', view !== 'audio');
    });
  });

  // Analyze button
  document.getElementById('btn-analyze').addEventListener('click', async () => {
    try {
      const data = await api.analyze([]);
      showToast(`开始分析 ${data.chapter_count} 章`, 'success');
      watchTask(data.task_id, 'analyze');
    } catch (e) {
      showToast('分析失败: ' + e.message, 'error');
    }
  });

  document.getElementById('btn-analyze-current').addEventListener('click', async () => {
    if (!state.currentChapter) {
      showToast('请先选择章节', 'error');
      return;
    }
    try {
      await analyzeChapterIds([state.currentChapter.id]);
    } catch (e) {
      showToast('分析失败: ' + e.message, 'error');
    }
  });

  document.getElementById('btn-analyze-selected').addEventListener('click', async () => {
    try {
      await analyzeChapterIds([...state.selectedChapterIds].sort((a, b) => a - b));
    } catch (e) {
      showToast('分析失败: ' + e.message, 'error');
    }
  });

  // Synthesize button
  document.getElementById('btn-synthesize').addEventListener('click', async () => {
    if (!state.currentChapter) {
      showToast('请先选择章节', 'error');
      return;
    }
    try {
      const data = await api.synthesize([state.currentChapter.id]);
      showToast('开始合成', 'success');
      watchTask(data.task_id, 'synthesize');
    } catch (e) {
      showToast('合成失败: ' + e.message, 'error');
    }
  });

  // Synthesize all
  document.getElementById('btn-synthesize-all').addEventListener('click', async () => {
    try {
      const data = await api.synthesize([]);
      showToast(`开始合成 ${data.chapter_count} 章`, 'success');
      watchTask(data.task_id, 'synthesize');
    } catch (e) {
      showToast('合成失败: ' + e.message, 'error');
    }
  });

  // Export
  document.getElementById('btn-export').addEventListener('click', () => {
    if (!state.projectId) return;
    window.open(api.getExportUrl(state.projectId), '_blank');
  });

  // Save voices
  document.getElementById('btn-save-voices').addEventListener('click', saveVoicesConfig);

  // Play/pause
  document.getElementById('play-btn').addEventListener('click', togglePlay);

  // Cancel process
  document.getElementById('btn-cancel-process').addEventListener('click', () => {
    document.getElementById('processing-overlay').classList.add('hidden');
  });
}

async function handleUpload(file) {
  if (!file) return;
  const ext = file.name.split('.').pop().toLowerCase();
  if (!['epub', 'txt'].includes(ext)) {
    showToast('请上传 .epub 或 .txt 文件', 'error');
    return;
  }

  try {
    showToast('正在上传…');
    const data = await api.upload(file);

    state.projectId = data.project_id;
    state.filename = data.filename;
    state.chapters = [];
    state.currentChapterHasAnalysis = false;
    state.selectedChapterIds.clear();

    // Refresh projects list
    await loadProjects();
    setRouteProjectId(data.project_id);

    // Switch to project view
    document.getElementById('bookshelf').classList.add('hidden');
    document.getElementById('upload-zone').classList.add('hidden');
    document.getElementById('content-area').classList.remove('hidden');
    document.querySelector('.app').classList.remove('bookshelf-mode');
    document.querySelector('.sidebar').classList.remove('hidden');
    document.getElementById('right-panel').classList.remove('hidden');
    document.getElementById('header-filename').textContent = data.filename;
    document.getElementById('header-filename').style.display = '';
    document.getElementById('project-switcher').style.display = '';

    updateProjectSwitcher();

    showToast(`上传成功: ${data.chapter_count} 章, ${data.total_words.toLocaleString()} 字`, 'success');

    await refreshChapters();
    await loadVoices();

    // Auto-load first chapter
    if (state.chapters.length > 0) {
      await loadChapterContent(state.chapters[0].id);
    }
  } catch (e) {
    showToast('上传失败: ' + e.message, 'error');
  }
}

function saveVoicesConfig() {
  if (!state.projectId) return;

  const voices = {
    default: { ...(state.voices?.default || {}) },
    characters: { ...(state.voices?.characters || {}) }
  };

  // Read form values
  document.querySelectorAll('[data-role]').forEach(el => {
    const role = el.dataset.role;
    const field = el.dataset.field;
    const value = el.value;

    if (role === 'default') {
      voices.default[field] = value;
    } else if (role === 'char') {
      const name = el.dataset.name;
      if (!voices.characters[name]) voices.characters[name] = {};
      voices.characters[name][field] = value;
    }
  });

  voices.default.mode = 'preset';
  for (const name of Object.keys(voices.characters)) {
    voices.characters[name].mode = voices.characters[name].mode || 'preset';
  }

  api.updateVoices(state.projectId, voices)
    .then(() => {
      state.voices = voices;
      showToast('音色配置已保存', 'success');
    })
    .catch(e => showToast('保存失败: ' + e.message, 'error'));
}

function togglePlay() {
  const player = document.getElementById('audio-player');
  if (!state.projectId || !state.currentChapter) return;

  if (state.audioPlaying) {
    player.pause();
    state.audioPlaying = false;
  } else {
    player.src = api.getAudioUrl(state.projectId, state.currentChapter.id);
    player.play();
    state.audioPlaying = true;
  }

  const btn = document.getElementById('play-btn');
  btn.innerHTML = state.audioPlaying
    ? '<svg width="14" height="16" viewBox="0 0 14 16"><rect x="2" y="0" width="3" height="16"/><rect x="9" y="0" width="3" height="16"/></svg>'
    : '<svg width="14" height="16" viewBox="0 0 14 16"><polygon points="2,0 14,8 2,16"/></svg>';
}

function previewVoice(characterName) {
  showToast(`试听 ${characterName} 的音色（需后端支持）`);
}

// ── Init ──────────────────────────────────────
document.addEventListener('DOMContentLoaded', async () => {
  initEventHandlers();

  // Load projects list
  await loadProjects();

  const routeProjectId = getRouteProjectId();
  if (routeProjectId && state.projects.some(p => p.id === routeProjectId)) {
    await openProject(routeProjectId, false);
  } else if (routeProjectId) {
    showToast('项目不存在，已返回书架', 'error');
    showBookshelf(false);
    setRouteProjectId(null, true);
  } else if (state.projects.length > 0) {
    showBookshelf(false);
  } else {
    showBookshelf(false);
  }
});

window.addEventListener('popstate', async () => {
  const routeProjectId = getRouteProjectId();
  if (routeProjectId && state.projects.some(p => p.id === routeProjectId)) {
    await openProject(routeProjectId, false);
  } else {
    showBookshelf(false);
  }
});
</script>
